name: fetch-assets
on:
  push:
    branches: ["claude/**"]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    # CI 자신이 만든 커밋(무한루프 방지)은 건너뛴다
    if: ${{ !contains(github.event.head_commit.message, '(CI)') }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if assets already fetched
        id: check
        run: |
          if [ -f assets/raw/portrait_liubei.png ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download generated illustration assets
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p assets/raw
          python3 - <<'PY'
          import json, urllib.request
          items = json.load(open('tools/assets-manifest.json'))
          for it in items:
              dst = f"assets/raw/{it['name']}.png"
              urllib.request.urlretrieve(it['url'], dst)
              print('downloaded', dst)
          PY
      - name: Commit raw assets
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/raw
          git commit -m "일러스트 원본 에셋 다운로드 (CI)"
          git push
