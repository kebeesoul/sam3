name: fetch-sprites
on:
  push:
    branches: ["claude/**"]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '(CI)') }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if sprites already fetched
        id: check
        run: |
          if [ -f assets/raw/tower_archer.png ] || [ -f assets/img/tower_archer.png ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download sprite cutouts
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p assets/raw
          python3 - <<'PY'
          import json, urllib.request
          items = json.load(open('tools/sprites-manifest.json'))
          for it in items:
              dst = f"assets/raw/{it['name']}.png"
              urllib.request.urlretrieve(it['url'], dst)
              print('downloaded', dst)
          PY
      - name: Commit raw sprites
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/raw
          git commit -m "스프라이트 컷아웃 원본 다운로드 (CI)"
          git push
