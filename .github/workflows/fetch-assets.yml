name: fetch-terrain
on:
  push:
    branches: ["claude/**"]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '(CI)') }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if terrain assets already fetched
        id: check
        run: |
          if [ -f assets/raw/tex_grass.png ] || [ -f assets/img/tex_grass.png ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download terrain assets
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p assets/raw
          python3 - <<'PY'
          import json, urllib.request
          items = json.load(open('tools/terrain-manifest.json'))
          for it in items:
              dst = f"assets/raw/{it['name']}.png"
              urllib.request.urlretrieve(it['url'], dst)
              print('downloaded', dst)
          PY
      - name: Commit raw terrain assets
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/raw
          git commit -m "지형 에셋 원본 다운로드 (CI)"
          git push
