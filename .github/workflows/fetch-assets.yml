name: fetch-ship
on:
  push:
    branches: ["claude/**"]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '(CI)') }}
    steps:
      - uses: actions/checkout@v4
      - name: Check
        id: check
        run: |
          if [ -f assets/raw/deco_ship.png ] || [ -f assets/img/deco_ship.png ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p assets/raw
          python3 - <<'PY'
          import json, urllib.request
          for it in json.load(open('tools/terrain-manifest.json')):
              urllib.request.urlretrieve(it['url'], f"assets/raw/{it['name']}.png")
          PY
      - name: Commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/raw
          git commit -m "군선 에셋 다운로드 (CI)"
          git push
